_format_version: "2.1"
_transform: true

services:
  - name: auth-v1
    url: http://auth:9999
    routes:
      - name: auth-v1-route
        paths:
          - /auth/v1
        strip_path: true

  - name: rest-v1
    url: http://rest:3000
    routes:
      - name: rest-v1-route
        paths:
          - /rest/v1
        strip_path: true

  - name: realtime-v1
    url: http://realtime:4000
    routes:
      - name: realtime-v1-route
        paths:
          - /realtime/v1
        strip_path: true

  - name: storage-v1
    url: http://storage:5000
    routes:
      - name: storage-v1-route
        paths:
          - /storage/v1
        strip_path: true